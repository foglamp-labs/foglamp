# Local development overrides — auto-merged by `docker compose`.
#
# Publishes the Postgres, ClickHouse, and Redis ports to the host so the app
# tiers (server, ingest, web) can run locally with hot reload while the stateful
# infra stays in Docker. Typical dev loop:
#
#   docker compose up -d postgres clickhouse redis   # infra only (data persists in volumes)
#   bun dev                                           # server + ingest + web, hot-reloaded
#
# For a fully containerized production self-host, run without this file:
#   docker compose -f docker-compose.yml up --build
# (this override only adds host port mappings; it changes nothing else).
services:
  postgres:
    ports:
      - "5432:5432"
  clickhouse:
    ports:
      - "8123:8123"
  redis:
    ports:
      - "6379:6379"
