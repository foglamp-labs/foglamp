# CLA Assistant — gates pull requests until the contributor signs CLA.md.
#
# How it works: on a PR, the bot comments asking the contributor to reply with
# the signature phrase below. Once they do, their GitHub username is recorded in
# `signatures/cla.json` on the `cla-signatures` branch, and all future PRs from
# them pass automatically.
#
# SETUP (one-time, before going public):
#   1. Update `path-to-document` below to point at CLA.md in the FINAL public
#      repo (the current git remote is option-ai/boilerplate — change the slug
#      once the public repo exists).
#   2. Create a repo/org secret `CLA_SIGNATURES_TOKEN`: a Personal Access Token
#      with `repo` scope, used to write the signatures file. (GITHUB_TOKEN can't
#      push to the signatures branch on its own in all setups.)
#   3. Add maintainers/bots that should bypass the CLA to `allowlist`.
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/option-ai/watchtower/blob/master/CLA.md
          branch: cla-signatures
          custom-notsigned-pryou: "Thanks for your PR! Before we can merge it, please sign the Watchtower CLA by posting the comment below."
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA. ✅"
          allowlist: dependabot[bot],github-actions[bot]
